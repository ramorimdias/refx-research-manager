name: Release Windows App

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version number without v prefix, example 0.1.27
        required: true
        type: string
      release_notes:
        description: Optional release notes
        required: false
        type: string

jobs:
  release:
    uses: ./.github/workflows/release-platform.yml
    with:
      version: ${{ inputs.version }}
      release_notes: ${{ inputs.release_notes }}
      platforms: windows
    secrets: inherit
