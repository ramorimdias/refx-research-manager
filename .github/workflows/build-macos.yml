name: Build macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Tauri icons
        run: pnpm tauri:icons

      - name: Build Apple Silicon app bundle
        env:
          NEXT_PUBLIC_SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.NEXT_PUBLIC_SEMANTIC_SCHOLAR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: pnpm exec tauri build --bundles app --target aarch64-apple-darwin --no-sign

      - name: Build Intel app bundle
        env:
          NEXT_PUBLIC_SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.NEXT_PUBLIC_SEMANTIC_SCHOLAR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: pnpm exec tauri build --bundles app --target x86_64-apple-darwin --no-sign

      - name: Merge universal app bundle
        shell: bash
        run: |
          APP_NAME="$(node -p "require('./src-tauri/tauri.conf.json').productName")"
          ARM_APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/${APP_NAME}.app"
          X64_APP="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/${APP_NAME}.app"
          UNIVERSAL_ROOT="src-tauri/target/universal-apple-darwin/release/bundle"
          UNIVERSAL_APP_DIR="${UNIVERSAL_ROOT}/macos"
          UNIVERSAL_APP="${UNIVERSAL_APP_DIR}/${APP_NAME}.app"

          mkdir -p "${UNIVERSAL_APP_DIR}" "${UNIVERSAL_ROOT}/dmg"
          ditto "${ARM_APP}" "${UNIVERSAL_APP}"

          while IFS= read -r -d '' arm_file; do
            rel_path="${arm_file#${ARM_APP}/}"
            x64_file="${X64_APP}/${rel_path}"
            universal_file="${UNIVERSAL_APP}/${rel_path}"

            if [[ -f "${x64_file}" ]] && file "${arm_file}" | grep -q "Mach-O"; then
              lipo -create "${arm_file}" "${x64_file}" -output "${universal_file}"
            fi
          done < <(find "${ARM_APP}" -type f -print0)

          codesign --force --deep -s - "${UNIVERSAL_APP}"

          EXECUTABLE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "${UNIVERSAL_APP}/Contents/Info.plist")"
          file "${UNIVERSAL_APP}/Contents/MacOS/${EXECUTABLE_NAME}"

          ditto -c -k --sequesterRsrc --keepParent "${UNIVERSAL_APP}" "${UNIVERSAL_ROOT}/${APP_NAME}.app.zip"
          hdiutil create -volname "${APP_NAME}" -srcfolder "${UNIVERSAL_APP}" -ov -format UDZO "${UNIVERSAL_ROOT}/dmg/${APP_NAME}.dmg"

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.app
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.zip
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
