name: Build macOS Intel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Tauri icons
        run: pnpm tauri:icons

      - name: Build Intel macOS app bundle
        env:
          NEXT_PUBLIC_SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.NEXT_PUBLIC_SEMANTIC_SCHOLAR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: pnpm exec tauri build --bundles app --target x86_64-apple-darwin --no-sign

      - name: Package Intel app
        shell: bash
        run: |
          APP_NAME="$(node -p "require('./src-tauri/tauri.conf.json').productName")"
          APP_ROOT="src-tauri/target/x86_64-apple-darwin/release/bundle"
          APP_PATH="${APP_ROOT}/macos/${APP_NAME}.app"
          DMG_DIR="${APP_ROOT}/dmg"

          mkdir -p "${DMG_DIR}"
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${APP_ROOT}/${APP_NAME}.app.zip"
          hdiutil create -volname "${APP_NAME}" -srcfolder "${APP_PATH}" -ov -format UDZO "${DMG_DIR}/${APP_NAME}-x86_64.dmg"

          EXECUTABLE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "${APP_PATH}/Contents/Info.plist")"
          file "${APP_PATH}/Contents/MacOS/${EXECUTABLE_NAME}"

      - name: Upload Intel macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-x86_64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.app
            src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.zip
            src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.dmg
